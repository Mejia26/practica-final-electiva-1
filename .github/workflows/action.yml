name: CI/CD - Test and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Se ejecuta cada vez que subes cambios a la rama main

permissions:
  contents: write  # Permiso necesario para que la acción pueda escribir en la rama gh-pages

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas unitarias e integración
        run: npm test  # Esto ejecutará el comando "jest" que configuramos antes

  deploy:
    needs: build-and-test  # Solo se ejecuta si el job de pruebas termina con éxito
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Desplegar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public  # Carpeta donde está tu HTML, CSS y JS frontend
