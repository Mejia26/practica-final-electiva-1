<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi App Simple</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 8px; width: 70%; }
        button { padding: 8px; cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Lista de Items</h2>
        <input type="text" id="itemName" placeholder="Nuevo item...">
        <button onclick="addItem()">Agregar</button>
        <ul id="itemList"></ul>
    </div>

    <script>
        async function fetchItems() {
            const res = await fetch('/api/items');
            const data = await res.json();
            const list = document.getElementById('itemList');
            list.innerHTML = data.map(i => `<li>${i.name}</li>`).join('');
        }

        async function addItem() {
            const name = document.getElementById('itemName').value;
            await fetch('/api/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            document.getElementById('itemName').value = '';
            fetchItems();
        }
        fetchItems();
    </script>
</body>
</html>
